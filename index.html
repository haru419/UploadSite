<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
}

.profile{
display:flex;
gap:15px;
align-items:center;
margin-bottom:20px;
}

.profile img{
width:90px;
height:90px;
border-radius:50%;
cursor:pointer;
border:2px solid #5865f2;
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:10px;
background:#5865f2;
color:white;
transition:.2s;
}

button:hover{transform:scale(1.05);}

.follow{
background:#22c55e;
}

.unfollow{
background:#ef4444;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:10px;
margin-top:20px;
}

.post{
width:100%;
height:160px;
object-fit:cover;
border-radius:10px;
}

.small{
opacity:.7;
font-size:14px;
margin-top:5px;
}
</style>
</head>

<body>

<div class="container">

<div class="profile">
<img id="avatar" onclick="changeAvatar()">
<div style="flex:1">
<h2 id="name"></h2>

<div class="small" id="followCount"></div>

<textarea id="bio"></textarea>

<button onclick="saveBio()">プロフィール保存</button>

<div id="followArea"></div>
</div>
</div>

<div class="grid" id="posts"></div>

</div>

<script>

const supabaseUrl = "https://dnzxeiukhdcysqxtvcab.supabase.co";
const supabaseKey = "sb_publishable_p1-D04hIexKwLQoprjW1Ww_PWyzW8Ra";

const client = supabase.createClient(supabaseUrl, supabaseKey);

const uid = new URLSearchParams(location.search).get("uid");

let me = null;

/* ===== 初期化 ===== */
async function init(){

const { data:{session} } = await client.auth.getSession();
if(session) me = session.user;

await loadProfile();
await loadPosts();
await loadFollow();
}

/* ===== プロフィール取得 ===== */
async function loadProfile(){

const { data } = await client
.from("profiles")
.select("*")
.eq("id", uid)
.single();

document.getElementById("name").innerText =
data.full_name || "名無し";

document.getElementById("avatar").src =
data.avatar_url || "https://via.placeholder.com/80";

document.getElementById("bio").value =
data.bio || "";
}

/* ===== bio保存 ===== */
async function saveBio(){

if(!me || me.id !== uid){
alert("自分のプロフィールのみ編集できます");
return;
}

await client.from("profiles")
.upsert({
id: me.id,
bio: document.getElementById("bio").value
});

loadProfile();
}

/* ===== アイコン変更 ===== */
async function changeAvatar(){

if(!me || me.id !== uid){
alert("自分のみ変更できます");
return;
}

const url = prompt("新しいアイコンURLを入力");

if(!url) return;

await client.from("profiles")
.upsert({
id: me.id,
avatar_url: url
});

loadProfile();
}

/* ===== フォロー ===== */
async function follow(){

await client.from("follows").insert({
follower_id: me.id,
following_id: uid
});

loadFollow();
}

async function unfollow(){

await client.from("follows")
.delete()
.eq("follower_id", me.id)
.eq("following_id", uid);

loadFollow();
}

/* ===== フォロー状態 ===== */
async function loadFollow(){

const { data } = await client
.from("follows")
.select("*")
.eq("following_id", uid);

const isFollowing =
data?.some(f => f.follower_id === me?.id);

const area = document.getElementById("followArea");

if(me?.id === uid){
area.innerHTML = "<b>あなたのプロフィール</b>";
return;
}

area.innerHTML = isFollowing
? `<button class="unfollow" onclick="unfollow()">フォロー解除</button>`
: `<button class="follow" onclick="follow()">フォローする</button>`;
}

/* ===== フォロー数 ===== */
async function loadFollowCount(){

const { data } = await client
.from("follows")
.select("*")
.eq("following_id", uid);

document.getElementById("followCount").innerText =
`フォロワー: ${data.length}`;
}

/* ===== 投稿 ===== */
async function loadPosts(){

const { data } = await client
.from("posts")
.select("*")
.eq("user_id", uid)
.order("created_at",{ascending:false});

const box = document.getElementById("posts");
box.innerHTML = "";

data.forEach(p=>{
box.innerHTML += `
<img class="post" src="${p.image_url}">
`;
});
}

init();

loadFollowCount();

</script>

</body>
</html>
