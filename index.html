<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UploadSNS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;
padding:20px;
}

header{
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
margin-bottom:20px;
}

input{
padding:10px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
background:#5865f2;
color:white;
transition:.2s;
}

button:hover{transform:scale(1.05);}

.grid{
max-width:900px;
margin:auto;
}

.card{
background:#111827;
border-radius:15px;
padding:10px;
margin-bottom:15px;
}

img{
width:100%;
border-radius:10px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
gap:10px;
flex-wrap:wrap;
}

.like{background:#ef4444;}
.liked{background:#f97316;}
.delete{background:#dc2626;}

.small{
opacity:.7;
font-size:13px;
}
</style>
</head>

<body>

<header>
<input id="search" placeholder="検索">

<button onclick="toggleMyLikes()">❤️いいね一覧</button>
<button onclick="toggleMyPosts()">📌マイ投稿</button>
<button id="loginBtn">ログイン</button>
</header>

<div class="grid" id="posts"></div>

<script>

const supabaseUrl = "https://dnzxeiukhdcysqxtvcab.supabase.co";
const supabaseKey = "sb_publishable_p1-D04hIexKwLQoprjW1Ww_PWyzW8Ra";

const client = supabase.createClient(supabaseUrl, supabaseKey);

let user = null;
let showLikesOnly = false;
let showMineOnly = false;

/* ===== ログイン ===== */
async function init(){
const { data:{session} } = await client.auth.getSession();
if(session) user = session.user;
loadPosts();
}
init();

/* ===== ログインボタン ===== */
document.getElementById("loginBtn").onclick = async ()=>{
await client.auth.signInWithOAuth({
provider:"discord",
options:{redirectTo:location.href}
});
};

/* ===== マイ投稿 ===== */
function toggleMyPosts(){
showMineOnly = !showMineOnly;
loadPosts();
}

/* ===== いいね一覧 ===== */
function toggleMyLikes(){
showLikesOnly = !showLikesOnly;
loadPosts();
}

/* ===== いいね ===== */
async function toggleLike(postId){

if(!user) return alert("ログインしてください");

const { data } = await client
.from("likes")
.select("*")
.eq("user_id", user.id)
.eq("post_id", postId)
.single();

if(data){

await client.from("likes")
.delete()
.eq("user_id", user.id)
.eq("post_id", postId);

}else{

await client.from("likes")
.insert({
user_id:user.id,
post_id:postId
});
}

loadPosts();
}

/* ===== ダウンロード ===== */
async function downloadImage(url, filename){

const res = await fetch(url);
const blob = await res.blob();

const blobUrl = URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = blobUrl;
a.download = filename || "image.jpg";
document.body.appendChild(a);
a.click();
a.remove();

URL.revokeObjectURL(blobUrl);
}

/* ===== 削除 ===== */
async function deletePost(id){

if(!user) return alert("ログインしてください");

await client.from("posts")
.delete()
.eq("id", id);

loadPosts();
}

/* ===== 投稿取得 ===== */
async function loadPosts(){

const { data:posts } = await client
.from("posts")
.select("*")
.order("created_at",{ascending:false});

const { data:likes } = user
? await client.from("likes").select("*").eq("user_id", user.id)
: { data:[] };

let filtered = posts;

/* マイ投稿 */
if(showMineOnly && user){
filtered = filtered.filter(p => p.user_id === user.id);
}

/* いいね投稿 */
if(showLikesOnly && user){
const ids = likes.map(l=>l.post_id);
filtered = filtered.filter(p => ids.includes(p.id));
}

render(filtered, likes);
}

/* ===== 描画 ===== */
function render(posts, likes){

const box = document.getElementById("posts");
box.innerHTML = "";

posts.forEach(p=>{

const isLiked = likes?.some(l=>l.post_id === p.id);
const isOwner = user && p.user_id === user.id;

box.innerHTML += `
<div class="card">

<img src="${p.image_url}">

<div class="row">

<div>
<div>${p.title}</div>
<div class="small">${p.user_name}</div>
</div>

</div>

<div class="row">

<button class="${isLiked ? 'liked':'like'}"
onclick="toggleLike(${p.id})">
❤️
</button>

<button onclick="downloadImage('${p.image_url}','${p.title}')">
📥DL
</button>

${isOwner ? `
<button class="delete"
onclick="deletePost(${p.id})">
削除
</button>
` : ""}

</div>

</div>
`;
});
}

/* 検索 */
document.getElementById("search").addEventListener("input",loadPosts);

</script>

</body>
</html>
