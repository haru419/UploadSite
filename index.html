<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>アップロード</title>
</head>
<body>

<h1>画像アップロード</h1>

<input type="file" id="file">

<button onclick="uploadFile()">アップロード</button>

<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyAwHw87itk1y5ktvPE7IAp6xEaVXlNSTqc",
authDomain: "uploadsite-453f6.firebaseapp.com",
projectId: "uploadsite-453f6",
storageBucket: "uploadsite-453f6.firebasestorage.app",
messagingSenderId: "235162019838",
appId: "1:235162019838:web:ee3c321eeb7921ae38c2af"
};

const app = initializeApp(firebaseConfig);

const storage = getStorage(app);

window.uploadFile = async function(){

const file =
document.getElementById("file").files[0];

if(!file){
alert("ファイルを選択してください");
return;
}

const storageRef =
ref(storage, "uploads/" + file.name);

document.getElementById("status").textContent =
"アップロード中...";

await uploadBytes(storageRef, file);

const url =
await getDownloadURL(storageRef);

document.getElementById("status").innerHTML =
`完了！<br><a href="${url}" target="_blank">画像を見る</a>`;
}

</script>

</body>
</html>
