<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
}

.card{
background:#111827;
padding:15px;
border-radius:15px;
}

.profile{
display:flex;
gap:15px;
align-items:center;
margin-bottom:15px;
}

.profile img{
width:80px;
height:80px;
border-radius:50%;
}

textarea{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:10px;
background:#5865f2;
color:white;
transition:.2s;
}

button:hover{transform:scale(1.05);}

.follow{background:#22c55e;}
.unfollow{background:#ef4444;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:10px;
margin-top:15px;
}

.post{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.small{
opacity:.7;
font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="profile">
<img id="avatar">
<div>
<h2 id="name"></h2>
<div class="small" id="followState"></div>
</div>
</div>

<textarea id="bio" placeholder="自己紹介"></textarea>

<button onclick="saveBio()">プロフィール保存</button>

<div id="followArea"></div>

</div>

<div class="grid" id="posts"></div>

</div>

<script>

const supabaseUrl = "https://dnzxeiukhdcysqxtvcab.supabase.co";
const supabaseKey = "sb_publishable_p1-D04hIexKwLQoprjW1Ww_PWyzW8Ra";

const client = supabase.createClient(supabaseUrl, supabaseKey);

const uid = new URLSearchParams(location.search).get("uid");

let me = null;

/* ================= INIT ================= */
async function init(){

if(!uid){
document.body.innerHTML = "<h2>ユーザーが指定されていません</h2>";
return;
}

const { data:{session} } = await client.auth.getSession();
me = session?.user || null;

await loadProfile();
await loadFollow();
await loadPosts();
}
init();

/* ================= PROFILE ================= */
async function loadProfile(){

const { data, error } = await client
.from("profiles")
.select("*")
.eq("id", uid)
.single();

if(error || !data){
document.body.innerHTML = "<h2>プロフィールが見つかりません</h2>";
return;
}

document.getElementById("name").innerText =
data.full_name || "名無し";

document.getElementById("avatar").src =
data.avatar_url || "https://via.placeholder.com/80";

document.getElementById("bio").value =
data.bio || "";

/* 自分かどうか表示 */
document.getElementById("followState").innerText =
(me && me.id === uid) ? "あなたのプロフィール" : "";
}

/* ================= BIO ================= */
async function saveBio(){

if(!me || me.id !== uid){
alert("自分のプロフィールのみ編集できます");
return;
}

await client.from("profiles")
.upsert({
id: me.id,
bio: document.getElementById("bio").value
});

loadProfile();
}

/* ================= FOLLOW ================= */
async function follow(){

if(!me) return alert("ログインしてください");

await client.from("follows")
.insert({
follower_id: me.id,
following_id: uid
});

loadFollow();
}

async function unfollow(){

await client.from("follows")
.delete()
.eq("follower_id", me.id)
.eq("following_id", uid);

loadFollow();
}

async function loadFollow(){

const box = document.getElementById("followArea");

if(!me){
box.innerHTML = "ログインしてください";
return;
}

if(me.id === uid){
box.innerHTML = "自分のプロフィールです";
return;
}

const { data } = await client
.from("follows")
.select("*")
.eq("follower_id", me.id)
.eq("following_id", uid);

const isFollowing = data && data.length > 0;

box.innerHTML = isFollowing
? `<button class="unfollow" onclick="unfollow()">フォロー解除</button>`
: `<button class="follow" onclick="follow()">フォローする</button>`;
}

/* ================= POSTS ================= */
async function loadPosts(){

const { data } = await client
.from("posts")
.select("*")
.eq("user_id", uid)
.order("created_at",{ascending:false});

const box = document.getElementById("posts");
box.innerHTML = "";

if(!data || data.length === 0){
box.innerHTML = "<p>投稿がありません</p>";
return;
}

data.forEach(p=>{
box.innerHTML += `
<img class="post" src="${p.image_url}">
`;
});
}

</script>

</body>
</html>
