<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNS Fix</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;background:#0f172a;color:white;font-family:sans-serif;}
header{display:flex;gap:10px;padding:15px;background:#111827;position:sticky;top:0;}
button{padding:10px;border:none;border-radius:10px;background:#5865f2;color:white;cursor:pointer;}
.container{max-width:900px;margin:auto;padding:15px;}
.card{background:#111827;padding:10px;border-radius:10px;margin-bottom:10px;}
img{width:100%;border-radius:10px;}
.row{display:flex;justify-content:space-between;margin-top:10px;flex-wrap:wrap;gap:10px;}
.name{color:#60a5fa;cursor:pointer;}
.like{background:#ef4444;}
.liked{background:#f97316;}
.delete{background:#dc2626;}
</style>
</head>

<body>

<header>
<button onclick="setMode('home')">ホーム</button>
<button onclick="setMode('follow')">フォロー</button>
<button onclick="toggleUpload()">投稿</button>
</header>

<div class="container">

<input type="file" id="file" style="margin-bottom:10px;">

<div id="posts"></div>

</div>

<script>

const client = supabase.createClient(
"https://dnzxeiukhdcysqxtvcab.supabase.co",
"sb_publishable_p1-D04hIexKwLQoprjW1Ww_PWyzW8Ra"
);

let user=null;
let mode="home";
let following=[];
let likes=[];

async function init(){
const { data:{session} } = await client.auth.getSession();
user=session?.user||null;

loadFollow();
loadLikes();
loadPosts();
}
init();

/* ===== 投稿 ===== */
document.getElementById("file").onchange=async(e)=>{
const file=e.target.files[0];
const name=Date.now()+file.name;

await client.storage.from("uploads").upload(name,file);

const { data } = client.storage.from("uploads").getPublicUrl(name);

await client.from("posts").insert({
title:file.name,
image_url:data.publicUrl,
user_id:user.id,
user_name:user.user_metadata.full_name
});

loadPosts();
};

/* ===== 投稿取得 ===== */
async function loadPosts(){

const { data } = await client.from("posts").select("*");

let list=data;

if(mode==="follow"&&user){
list=list.filter(p=>following.includes(p.user_id));
}

render(list);
}

/* ===== フォロー ===== */
async function loadFollow(){
if(!user) return;

const { data } = await client.from("follows")
.select("following_id")
.eq("follower_id",user.id);

following=data.map(d=>d.following_id);
}

/* ===== いいね ===== */
async function loadLikes(){
if(!user) return;

const { data } = await client.from("likes")
.select("*")
.eq("user_id",user.id);

likes=data;
}

/* ===== いいね ===== */
async function toggleLike(id){

const exist=likes.find(l=>l.post_id===id);

if(exist){
await client.from("likes")
.delete()
.eq("user_id",user.id)
.eq("post_id",id);
}else{
await client.from("likes")
.insert({user_id:user.id,post_id:id});
}

loadLikes();
loadPosts();
}

/* ===== 削除 ===== */
async function deletePost(id){
await client.from("posts")
.delete()
.eq("id",id);

loadPosts();
}

/* ===== DL ===== */
async function download(url,name){

const r=await fetch(url);
const b=await r.blob();

const a=document.createElement("a");
a.href=URL.createObjectURL(b);
a.download=name;
a.click();
}

/* ===== UI ===== */
function render(list){

const box=document.getElementById("posts");
box.innerHTML="";

list.forEach(p=>{

const isLike=likes.some(l=>l.post_id===p.id);
const isOwner=user&&user.id===p.user_id;

box.innerHTML+=`
<div class="card">

<img src="${p.image_url}">

<div class="row">
<div>
<div>${p.title}</div>
<div class="name" onclick="openProfile('${p.user_id}')">
${p.user_name}
</div>
</div>
</div>

<div class="row">

<button class="${isLike?'liked':'like'}"
onclick="toggleLike(${p.id})">❤️</button>

<button onclick="download('${p.image_url}','${p.title}')">📥</button>

${isOwner?`
<button class="delete" onclick="deletePost(${p.id})">削除</button>
`:''}

</div>

</div>
`;
});
}

function openProfile(uid){
location.href=`profile.html?uid=${uid}`;
}

function setMode(m){
mode=m;
loadPosts();
}

function toggleUpload(){
document.getElementById("file").click();
}

</script>

</body>
</html>
