<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNS Home</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;
}

header{
display:flex;
justify-content:space-between;
padding:15px;
background:#111827;
position:sticky;
top:0;
}

input{
padding:10px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
}

button{
padding:10px 14px;
border:none;
border-radius:10px;
background:#5865f2;
color:white;
cursor:pointer;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

.upload{
border:2px dashed #5865f2;
padding:20px;
border-radius:10px;
margin:15px 0;
}

.card{
background:#111827;
padding:10px;
margin-bottom:10px;
border-radius:10px;
}

img{
width:100%;
border-radius:10px;
}

.row{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.name{
color:#60a5fa;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<input id="search" placeholder="検索">
<button onclick="toggleUpload()">投稿</button>
<button onclick="setMode('home')">ホーム</button>
<button onclick="setMode('follow')">フォロー</button>
</header>

<div class="container">

<div class="upload" id="uploadBox" style="display:none;">
<input type="file" id="file">
</div>

<div id="posts"></div>

</div>

<script>

const client = supabase.createClient(
"https://dnzxeiukhdcysqxtvcab.supabase.co",
"sb_publishable_p1-D04hIexKwLQoprjW1Ww_PWyzW8Ra"
);

let user = null;
let mode = "home";
let following = [];
let likes = [];

async function init(){
const { data:{session} } = await client.auth.getSession();
user = session?.user || null;

loadFollow();
loadPosts();
}
init();

/* ===== upload ===== */
document.getElementById("file").onchange = async (e)=>{

const file = e.target.files[0];
const name = Date.now()+file.name;

await client.storage.from("uploads").upload(name,file);

const { data } = client.storage.from("uploads").getPublicUrl(name);

await client.from("posts").insert({
title:file.name,
image_url:data.publicUrl,
user_id:user.id,
user_name:user.user_metadata.full_name
});

loadPosts();
};

/* ===== 投稿取得 ===== */
async function loadPosts(){

const { data } = await client.from("posts").select("*");

let list = data;

if(mode==="follow" && user){
list = data.filter(p=>following.includes(p.user_id));
}

render(list);
}

/* ===== フォロー ===== */
async function loadFollow(){
if(!user) return;

const { data } = await client
.from("follows")
.select("following_id")
.eq("follower_id",user.id);

following = data.map(d=>d.following_id);
}

/* ===== UI ===== */
function render(list){

const box = document.getElementById("posts");
box.innerHTML = "";

list.forEach(p=>{
box.innerHTML += `
<div class="card">

<img src="${p.image_url}">

<div class="row">
<div>
<div>${p.title}</div>
<div class="name" onclick="openProfile('${p.user_id}')">
${p.user_name}
</div>
</div>
</div>

</div>
`;
});
}

/* ===== プロフ ===== */
function openProfile(uid){
location.href = `profile.html?uid=${uid}`;
}

function setMode(m){
mode=m;
loadPosts();
}

function toggleUpload(){
document.getElementById("uploadBox").style.display =
document.getElementById("uploadBox").style.display==="none"
? "block":"none";
}

</script>

</body>
</html>
