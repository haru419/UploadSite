<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stable SNS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111827;
position:sticky;
top:0;
z-index:10;
}

.left, .right{
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
}

button{
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
background:#5865f2;
color:white;
transition:.2s;
}

button:hover{transform:scale(1.05);}

input{
padding:10px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

/* upload */
.uploadBox{
border:2px dashed #5865f2;
padding:20px;
border-radius:15px;
text-align:center;
margin:15px 0;
background:#0f172a;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
}

.card{
background:#111827;
border-radius:15px;
overflow:hidden;
padding:10px;
}

.card img{
width:100%;
border-radius:10px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
gap:10px;
flex-wrap:wrap;
}

.small{
opacity:.7;
font-size:13px;
}

.nameLink{
cursor:pointer;
color:#60a5fa;
}

.like{background:#ef4444;}
.liked{background:#f97316;}
.delete{background:#dc2626;}
.follow{background:#22c55e;}
.unfollow{background:#ef4444;}

.profileBar{
background:#0f172a;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}
</style>
</head>

<body>

<header>
<div class="left">
<input id="search" placeholder="検索">
<button onclick="setMode('home')">ホーム</button>
<button onclick="setMode('follow')">フォロー</button>
<button onclick="toggleUpload()">投稿</button>
</div>

<div class="right">
<button id="loginBtn">ログイン</button>
</div>
</header>

<div class="container">

<!-- アップロードUI -->
<div id="uploadBox" class="uploadBox" style="display:none;">
<h3>画像アップロード</h3>
<input type="file" id="fileInput" accept="image/*">
</div>

<div id="posts"></div>

</div>

<script>

const supabaseUrl = "https://dnzxeiukhdcysqxtvcab.supabase.co";
const supabaseKey = "sb_publishable_p1-D04hIexKwLQoprjW1Ww_PWyzW8Ra";

const client = supabase.createClient(supabaseUrl, supabaseKey);

let user = null;
let mode = "home";
let followingList = [];
let likes = [];

/* ===== init ===== */
async function init(){

const { data:{session} } = await client.auth.getSession();
if(session) user = session.user;

await loadFollowing();
await loadLikes();
loadPosts();
}
init();

/* ===== login ===== */
document.getElementById("loginBtn").onclick = async ()=>{
await client.auth.signInWithOAuth({
provider:"discord",
options:{redirectTo:location.href}
});
};

/* ===== upload toggle ===== */
function toggleUpload(){
document.getElementById("uploadBox").style.display =
document.getElementById("uploadBox").style.display === "none"
? "block" : "none";
}

/* ===== mode ===== */
function setMode(m){
mode = m;
loadPosts();
}

/* ===== フォロー一覧 ===== */
async function loadFollowing(){

if(!user) return;

const { data } = await client
.from("follows")
.select("following_id")
.eq("follower_id", user.id);

followingList = data.map(f => f.following_id);
}

/* ===== いいね ===== */
async function loadLikes(){

if(!user) return;

const { data } = await client
.from("likes")
.select("*")
.eq("user_id", user.id);

likes = data;
}

/* ===== 投稿 ===== */
async function loadPosts(){

const { data:posts } = await client
.from("posts")
.select("*")
.order("created_at",{ascending:false});

let filtered = posts;

/* フォロータイムライン */
if(mode === "follow" && user){
filtered = posts.filter(p =>
followingList.includes(p.user_id)
);
}

render(filtered);
}

/* ===== いいね ===== */
async function toggleLike(id){

if(!user) return;

const exists = likes.find(l => l.post_id === id);

if(exists){
await client.from("likes")
.delete()
.eq("user_id", user.id)
.eq("post_id", id);
}else{
await client.from("likes")
.insert({user_id:user.id,post_id:id});
}

await loadLikes();
loadPosts();
}

/* ===== 削除 ===== */
async function deletePost(id){

if(!user) return;

await client.from("posts")
.delete()
.eq("id", id);

loadPosts();
}

/* ===== ダウンロード ===== */
async function downloadImage(url,name){

const res = await fetch(url);
const blob = await res.blob();

const a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = name || "image.jpg";
a.click();
}

/* ===== 投稿UI ===== */
function render(posts){

const box = document.getElementById("posts");
box.innerHTML = "";

posts.forEach(p=>{

const isLiked = likes.some(l => l.post_id === p.id);
const isOwner = user && p.user_id === user.id;

box.innerHTML += `
<div class="card">

<img src="${p.image_url}">

<div class="row">
<div>
<div>${p.title}</div>

<div class="small">
<span class="nameLink"
onclick="openProfile('${p.user_id}')">
${p.user_name}
</span>
</div>

</div>
</div>

<div class="row">

<button class="${isLiked?'liked':'like'}"
onclick="toggleLike(${p.id})">いいね</button>

<button onclick="downloadImage('${p.image_url}','${p.title}')">ダウンロード</button>

${isOwner ? `
<button class="delete"
onclick="deletePost(${p.id})">削除</button>
` : ""}

</div>

</div>
`;
});
}

/* ===== プロフィールへ ===== */
function openProfile(uid){
location.href = `profile.html?uid=${uid}`;
}

/* ===== upload ===== */
document.getElementById("fileInput").onchange = async (e)=>{

if(!user) return alert("ログインしてください");

const file = e.target.files[0];
const name = Date.now() + file.name;

await client.storage.from("uploads").upload(name,file);

const { data } = client.storage.from("uploads").getPublicUrl(name);

await client.from("posts").insert({
title:file.name,
image_url:data.publicUrl,
user_name:user.user_metadata.full_name,
user_id:user.id
});

loadPosts();
};

</script>

</body>
</html>
