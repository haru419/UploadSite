<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UploadSite</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
padding:20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
gap:10px;
flex-wrap:wrap;
}

h1{
font-size:32px;
}

.top-right{
display:flex;
gap:10px;
align-items:center;
}

button{
border:none;
padding:12px 18px;
border-radius:12px;
background:#5865f2;
color:white;
cursor:pointer;
font-size:15px;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

input{
padding:12px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
width:250px;
}

#drop{
border:3px dashed #5865f2;
border-radius:20px;
padding:50px;
text-align:center;
margin-bottom:20px;
transition:.2s;
background:#111827;
}

#drop.drag{
background:#1e293b;
transform:scale(1.01);
}

#progressBox{
width:100%;
height:20px;
background:#1e293b;
border-radius:999px;
overflow:hidden;
margin-top:20px;
display:none;
}

#progress{
height:100%;
width:0%;
background:#5865f2;
}

#gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:#111827;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,0,0,.3);
animation:fade .3s;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

.info{
padding:15px;
}

.user{
display:flex;
align-items:center;
gap:10px;
margin-top:10px;
}

.user img{
width:35px;
height:35px;
border-radius:50%;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:none;
}
}

@media(max-width:600px){

input{
width:100%;
}

header{
flex-direction:column;
align-items:stretch;
}

.top-right{
flex-direction:column;
}

}

</style>
</head>
<body>

<header>

<h1>UploadSite</h1>

<div class="top-right">

<input type="text" id="search" placeholder="検索">

<button id="loginBtn">
Discordログイン
</button>

</div>

</header>

<div id="drop">

<h2>ドラッグ&ドロップ</h2>
<p>またはクリックして画像を選択</p>

<input type="file" id="fileInput" hidden accept="image/*">

<div id="progressBox">
<div id="progress"></div>
</div>

</div>

<div id="gallery"></div>

<script>

const supabaseUrl = "https://dnzxeiukhdcysqxtvcab.supabase.co/";
const supabaseKey = "sb_publishable_p1-D04hIexKwLQoprjW1Ww_PWyzW8Ra";

const supabase =
window.supabase.createClient(
supabaseUrl,
supabaseKey
);

let currentUser = null;

async function checkUser(){

const {
data:{session}
} = await supabase.auth.getSession();

if(session){

currentUser = session.user;

document.getElementById("loginBtn").innerText =
session.user.user_metadata.full_name;

}

}

checkUser();

document
.getElementById("loginBtn")
.onclick = async ()=>{

await supabase.auth.signInWithOAuth({
provider:"discord"
});

};

const drop =
document.getElementById("drop");

const fileInput =
document.getElementById("fileInput");

drop.onclick = ()=>{
fileInput.click();
};

drop.addEventListener("dragover",(e)=>{
e.preventDefault();
drop.classList.add("drag");
});

drop.addEventListener("dragleave",()=>{
drop.classList.remove("drag");
});

drop.addEventListener("drop",(e)=>{
e.preventDefault();

drop.classList.remove("drag");

const file = e.dataTransfer.files[0];

uploadFile(file);
});

fileInput.addEventListener("change",(e)=>{
uploadFile(e.target.files[0]);
});

async function uploadFile(file){

if(!currentUser){

alert("ログインしてください");
return;
}

if(!file) return;

const fileName =
Date.now()+"_"+file.name;

document.getElementById("progressBox")
.style.display = "block";

const progress =
document.getElementById("progress");

progress.style.width = "10%";

const {
data,
error
} = await supabase.storage
.from("uploads")
.upload(fileName,file);

if(error){

alert(error.message);
return;

}

progress.style.width = "70%";

const {
data:urlData
} = supabase.storage
.from("uploads")
.getPublicUrl(fileName);

progress.style.width = "90%";

await supabase
.from("posts")
.insert([{

title:file.name,

image_url:urlData.publicUrl,

user_name:
currentUser.user_metadata.full_name,

user_avatar:
currentUser.user_metadata.avatar_url,

user_id:
currentUser.id

}]);

progress.style.width = "100%";

setTimeout(()=>{
progress.style.width = "0%";
document.getElementById("progressBox")
.style.display = "none";
},500);

loadPosts();

}

async function loadPosts(){

const {
data
} = await supabase
.from("posts")
.select("*")
.order("created_at",{ascending:false});

renderPosts(data);

}

function renderPosts(posts){

const gallery =
document.getElementById("gallery");

const search =
document.getElementById("search")
.value
.toLowerCase();

gallery.innerHTML = "";

posts
.filter(post=>
post.title
.toLowerCase()
.includes(search)
)
.forEach(post=>{

gallery.innerHTML += `

<div class="card">

<img src="${post.image_url}">

<div class="info">

<h3>${post.title}</h3>

<div class="user">

<img src="${post.user_avatar}">

<span>${post.user_name}</span>

</div>

</div>

</div>

`;

});

}

document
.getElementById("search")
.addEventListener("input",loadPosts);

loadPosts();

</script>

</body>
</html>
