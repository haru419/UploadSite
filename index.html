<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UploadSNS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;
padding:20px;
}

header{
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
margin-bottom:20px;
}

input{
padding:10px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
background:#5865f2;
color:white;
transition:.2s;
}

button:hover{transform:scale(1.05);}

.active{
background:#22c55e;
}

.grid{
max-width:900px;
margin:auto;
}

.card{
background:#111827;
padding:10px;
border-radius:15px;
margin-bottom:15px;
}

img{
width:100%;
border-radius:10px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
flex-wrap:wrap;
gap:10px;
}

.small{
opacity:.7;
font-size:13px;
}
</style>
</head>

<body>

<header>

<input id="search" placeholder="検索">

<button id="homeBtn" class="active" onclick="setMode('home')">ホーム</button>
<button id="followBtn" onclick="setMode('follow')">フォロー</button>

<button id="loginBtn">ログイン</button>

</header>

<div class="grid" id="posts"></div>

<script>

const supabaseUrl = "https://dnzxeiukhdcysqxtvcab.supabase.co";
const supabaseKey = "sb_publishable_p1-D04hIexKwLQoprjW1Ww_PWyzW8Ra";

const client = supabase.createClient(supabaseUrl, supabaseKey);

let user = null;
let mode = "home";
let followingList = [];

/* ===== init ===== */
async function init(){

const { data:{session} } = await client.auth.getSession();
if(session) user = session.user;

await loadFollowing();
loadPosts();
}
init();

/* ===== login ===== */
document.getElementById("loginBtn").onclick = async ()=>{
await client.auth.signInWithOAuth({
provider:"discord",
options:{redirectTo:location.href}
});
};

/* ===== モード切替 ===== */
function setMode(m){

mode = m;

document.getElementById("homeBtn").classList.remove("active");
document.getElementById("followBtn").classList.remove("active");

if(m === "home"){
document.getElementById("homeBtn").classList.add("active");
}else{
document.getElementById("followBtn").classList.add("active");
}

loadPosts();
}

/* ===== フォロー一覧取得 ===== */
async function loadFollowing(){

if(!user) return;

const { data } = await client
.from("follows")
.select("following_id")
.eq("follower_id", user.id);

followingList = data.map(f => f.following_id);
}

/* ===== 投稿取得 ===== */
async function loadPosts(){

const { data:posts } = await client
.from("posts")
.select("*")
.order("created_at",{ascending:false});

let filtered = posts;

/* フォロータイムライン */
if(mode === "follow" && user){
filtered = posts.filter(p =>
followingList.includes(p.user_id)
);
}

render(filtered);
}

/* ===== 表示 ===== */
function render(posts){

const box = document.getElementById("posts");
box.innerHTML = "";

if(posts.length === 0){
box.innerHTML = "<p>投稿がありません</p>";
return;
}

posts.forEach(p=>{

box.innerHTML += `
<div class="card">

<img src="${p.image_url}">

<div class="row">
<div>
<div>${p.title}</div>
<div class="small">${p.user_name}</div>
</div>
</div>

</div>
`;
});
}

/* 検索 */
document.getElementById("search").addEventListener("input",loadPosts);

</script>

</body>
</html>
