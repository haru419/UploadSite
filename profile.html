<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;
padding:20px;
}

.container{max-width:700px;margin:auto;}

.card{
background:#111827;
padding:15px;
border-radius:10px;
}

.top{
display:flex;
gap:15px;
align-items:center;
}

.avatar{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
cursor:pointer;
border:2px solid #5865f2;
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:#5865f2;
color:white;
cursor:pointer;
margin-top:10px;
}

.follow{background:#22c55e;}
.unfollow{background:#ef4444;}

.post{
width:100%;
border-radius:10px;
margin-top:10px;
}

.small{opacity:.7;font-size:13px;}

.hidden{display:none;}
</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="top">
<img id="avatar" class="avatar" onclick="pickAvatar()">
<div>
<h2 id="name"></h2>
<div class="small" id="state"></div>
</div>
</div>

<input id="nameInput" placeholder="名前変更">
<textarea id="bio" placeholder="自己紹介"></textarea>

<button onclick="saveProfile()">プロフィール保存</button>

<div id="followArea"></div>

<input type="file" id="file" class="hidden">

</div>

<div id="posts"></div>

</div>

<script>

const client = supabase.createClient(
"https://dnzxeiukhdcysqxtvcab.supabase.co",
"sb_publishable_p1-D04hIexKwLQoprjW1Ww_PWyzW8Ra"
);

const uid = new URLSearchParams(location.search).get("uid");

let me=null;
let avatarFile=null;

/* ===== init ===== */
async function init(){

const { data:{session} } = await client.auth.getSession();
me=session?.user||null;

if(!uid){
document.body.innerHTML="UIDなし";
return;
}

loadProfile();
loadPosts();
loadFollow();
}
init();

/* ===== プロフィール取得 ===== */
async function loadProfile(){

const { data } = await client
.from("profiles")
.select("*")
.eq("id",uid)
.single();

document.getElementById("name").innerText=data.full_name||"名無し";
document.getElementById("bio").value=data.bio||"";
document.getElementById("nameInput").value=data.full_name||"";

document.getElementById("avatar").src=
data.avatar_url||"https://via.placeholder.com/80";

if(me && me.id===uid){
document.getElementById("state").innerText="あなたのプロフィール";
}
}

/* ===== 画像選択 ===== */
function pickAvatar(){
if(!me || me.id!==uid) return;

document.getElementById("file").click();
}

/* ===== 画像アップロード保持 ===== */
document.getElementById("file").onchange=async(e)=>{

const file=e.target.files[0];
if(!file) return;

const name=Date.now()+file.name;

await client.storage.from("avatars").upload(name,file);

const { data } = client.storage.from("avatars").getPublicUrl(name);

avatarFile=data.publicUrl;

document.getElementById("avatar").src=avatarFile;
};

/* ===== 保存 ===== */
async function saveProfile(){

if(!me || me.id!==uid){
alert("自分のみ編集できます");
return;
}

const name=document.getElementById("nameInput").value;
const bio=document.getElementById("bio").value;

await client.from("profiles").upsert({
id:uid,
full_name:name,
bio:bio,
avatar_url:avatarFile || document.getElementById("avatar").src
});

loadProfile();
}

/* ===== フォロー ===== */
async function follow(){
await client.from("follows").insert({
follower_id:me.id,
following_id:uid
});
loadFollow();
}

async function unfollow(){
await client.from("follows")
.delete()
.eq("follower_id",me.id)
.eq("following_id",uid);

loadFollow();
}

async function loadFollow(){

const box=document.getElementById("followArea");

if(!me){
box.innerHTML="ログインしてください";
return;
}

if(me.id===uid){
box.innerHTML="自分のプロフィール";
return;
}

const { data } = await client
.from("follows")
.select("*")
.eq("follower_id",me.id)
.eq("following_id",uid);

const is=data.length>0;

box.innerHTML=is
? `<button class="unfollow" onclick="unfollow()">フォロー解除</button>`
: `<button class="follow" onclick="follow()">フォローする</button>`;
}

/* ===== 投稿 ===== */
async function loadPosts(){

const { data } = await client
.from("posts")
.select("*")
.eq("user_id",uid);

const box=document.getElementById("posts");
box.innerHTML="";

data.forEach(p=>{
box.innerHTML+=`
<img class="post" src="${p.image_url}">
`;
});
}

</script>

</body>
</html>
