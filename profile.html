<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プロフィール</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;
padding:20px;
}

.profile{
display:flex;
align-items:center;
gap:15px;
margin-bottom:20px;
}

.profile img{
width:80px;
height:80px;
border-radius:50%;
}

h1{margin:0;font-size:24px;}

#posts{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
}

.card{
background:#111827;
border-radius:15px;
overflow:hidden;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.count{
opacity:.7;
margin-top:5px;
}
</style>
</head>

<body>

<div class="profile">
<img id="avatar">
<div>
<h1 id="name">読み込み中...</h1>
<div class="count" id="count"></div>
</div>
</div>

<div id="posts"></div>

<script>
const supabaseUrl = "https://dnzxeiukhdcysqxtvcab.supabase.co";
const supabaseKey = "sb_publishable_p1-D04hIexKwLQoprjW1Ww_PWyzW8Ra";

const client = window.supabase.createClient(supabaseUrl, supabaseKey);

let user = null;

async function init(){

const { data:{session} } = await client.auth.getSession();

if(!session){
document.body.innerHTML = "<h2>ログインしてください</h2>";
return;
}

user = session.user;

document.getElementById("name").innerText =
user.user_metadata.full_name;

document.getElementById("avatar").src =
user.user_metadata.avatar_url;

loadMyPosts();
}

async function loadMyPosts(){

const { data, error } = await client
.from("posts")
.select("*")
.eq("user_id", user.id)
.order("created_at",{ascending:false});

if(error){
console.log(error);
return;
}

document.getElementById("count").innerText =
"投稿数: " + data.length;

const posts = document.getElementById("posts");
posts.innerHTML = "";

data.forEach(post=>{
posts.innerHTML += `
<div class="card">
<img src="${post.image_url}">
</div>
`;
});
}

init();
</script>

</body>
</html>
