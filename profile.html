<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;
padding:20px;
}

.container{max-width:700px;margin:auto;}

.card{
background:#111827;
padding:15px;
border-radius:10px;
}

img{width:80px;height:80px;border-radius:50%;}

textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
background:#1e293b;
color:white;
border:none;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:#5865f2;
color:white;
cursor:pointer;
margin-top:10px;
}

.follow{background:#22c55e;}
.unfollow{background:#ef4444;}

.post{
width:100%;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<img id="avatar">
<h2 id="name"></h2>

<textarea id="bio"></textarea>

<button onclick="saveBio()">保存</button>

<div id="followBtn"></div>

</div>

<div id="posts"></div>

</div>

<script>

const client = supabase.createClient(
"https://dnzxeiukhdcysqxtvcab.supabase.co",
"sb_publishable_p1-D04hIexKwLQoprjW1Ww_PWyzW8Ra"
);

const uid = new URLSearchParams(location.search).get("uid");

let me=null;

async function init(){

const { data:{session} } = await client.auth.getSession();
me = session?.user || null;

if(!uid){
document.body.innerHTML="UIDなし";
return;
}

loadProfile();
loadPosts();
loadFollow();
}
init();

/* ===== profile ===== */
async function loadProfile(){

const { data } = await client
.from("profiles")
.select("*")
.eq("id",uid)
.single();

document.getElementById("name").innerText=data.full_name||"名無し";
document.getElementById("avatar").src=data.avatar_url||"";
document.getElementById("bio").value=data.bio||"";

if(me && me.id===uid){
document.getElementById("followBtn").innerHTML="自分のページ";
}
else{
checkFollow();
}
}

/* ===== follow ===== */
async function checkFollow(){

const { data } = await client
.from("follows")
.select("*")
.eq("follower_id",me.id)
.eq("following_id",uid);

const is=data.length>0;

document.getElementById("followBtn").innerHTML=
is
? `<button class="unfollow" onclick="unfollow()">解除</button>`
: `<button class="follow" onclick="follow()">フォロー</button>`;
}

async function follow(){
await client.from("follows").insert({
follower_id:me.id,
following_id:uid
});
checkFollow();
}

async function unfollow(){
await client.from("follows")
.delete()
.eq("follower_id",me.id)
.eq("following_id",uid);

checkFollow();
}

/* ===== bio ===== */
async function saveBio(){
if(me.id!==uid) return alert("不可");

await client.from("profiles").upsert({
id:uid,
bio:document.getElementById("bio").value
});
}

/* ===== posts ===== */
async function loadPosts(){

const { data } = await client
.from("posts")
.select("*")
.eq("user_id",uid);

const box=document.getElementById("posts");
box.innerHTML="";

data.forEach(p=>{
box.innerHTML+=`
<img class="post" src="${p.image_url}">
`;
});
}

</script>

</body>
</html>
