<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile UI Improved</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0b1220;
color:white;
}

/* ===== layout ===== */
.container{
max-width:800px;
margin:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

/* ===== profile card ===== */
.profileCard{
background:#111827;
border-radius:16px;
padding:20px;
display:flex;
gap:20px;
align-items:center;
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:3px solid #5865f2;
cursor:pointer;
}

.profileInfo{
flex:1;
}

.nameRow{
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
}

h2{
margin:0;
font-size:20px;
}

small{
opacity:.7;
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
background:#1e293b;
color:white;
}

/* ===== buttons ===== */
.btnRow{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

button{
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
background:#5865f2;
color:white;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

.follow{background:#22c55e;}
.unfollow{background:#ef4444;}

/* ===== posts ===== */
.postCard{
background:#111827;
border-radius:16px;
overflow:hidden;
transition:.2s;
}

.postCard:hover{
transform:translateY(-2px);
}

.postImg{
width:100%;
display:block;
}

.postBody{
padding:10px;
}

.postUser{
font-size:13px;
opacity:.7;
cursor:pointer;
color:#60a5fa;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<div class="container">

<!-- ===== PROFILE ===== -->
<div class="profileCard">

<img id="avatar" class="avatar" onclick="pickAvatar()">

<div class="profileInfo">

<div class="nameRow">
<h2 id="name"></h2>
<small id="state"></small>
</div>

<input id="nameInput" placeholder="名前">
<textarea id="bio" placeholder="自己紹介"></textarea>

<div class="btnRow">
<button onclick="saveProfile()">保存</button>
<div id="followArea"></div>
</div>

</div>
</div>

<!-- hidden file -->
<input type="file" id="file" class="hidden">

<!-- ===== POSTS ===== -->
<div id="posts"></div>

</div>

<script>

const client = supabase.createClient(
"https://dnzxeiukhdcysqxtvcab.supabase.co",
"sb_publishable_p1-D04hIexKwLQoprjW1Ww_PWyzW8Ra"
);

const uid = new URLSearchParams(location.search).get("uid");

let me=null;
let avatarUrl=null;

/* ===== init ===== */
async function init(){

const { data:{session} } = await client.auth.getSession();
me=session?.user||null;

if(!uid){
document.body.innerHTML="<h2>ユーザーが指定されていません</h2>";
return;
}

loadProfile();
loadPosts();
loadFollow();
}
init();

/* ===== profile ===== */
async function loadProfile(){

const { data } = await client
.from("profiles")
.select("*")
.eq("id",uid)
.single();

document.getElementById("name").innerText=data.full_name||"名無し";
document.getElementById("nameInput").value=data.full_name||"";
document.getElementById("bio").value=data.bio||"";

document.getElementById("avatar").src=
data.avatar_url||"https://via.placeholder.com/90";

document.getElementById("state").innerText=
(me && me.id===uid) ? "あなたのプロフィール" : "";
}

/* ===== avatar upload ===== */
function pickAvatar(){
if(!me || me.id!==uid) return;
document.getElementById("file").click();
}

document.getElementById("file").onchange=async(e)=>{

const file=e.target.files[0];
const name=Date.now()+file.name;

await client.storage.from("avatars").upload(name,file);

const { data } = client.storage.from("avatars").getPublicUrl(name);

avatarUrl=data.publicUrl;

document.getElementById("avatar").src=avatarUrl;
};

/* ===== save ===== */
async function saveProfile(){

if(!me || me.id!==uid){
alert("自分のみ編集可能");
return;
}

await client.from("profiles").upsert({
id:uid,
full_name:document.getElementById("nameInput").value,
bio:document.getElementById("bio").value,
avatar_url:avatarUrl
});

loadProfile();
}

/* ===== follow UI ===== */
async function loadFollow(){

const box=document.getElementById("followArea");

if(!me){
box.innerHTML="ログインしてください";
return;
}

if(me.id===uid){
box.innerHTML="";
return;
}

const { data } = await client
.from("follows")
.select("*")
.eq("follower_id",me.id)
.eq("following_id",uid);

const is=data.length>0;

box.innerHTML=is
? `<button class="unfollow" onclick="unfollow()">フォロー解除</button>`
: `<button class="follow" onclick="follow()">フォロー</button>`;
}

async function follow(){
await client.from("follows").insert({
follower_id:me.id,
following_id:uid
});
loadFollow();
}

async function unfollow(){
await client.from("follows")
.delete()
.eq("follower_id",me.id)
.eq("following_id",uid);

loadFollow();
}

/* ===== posts ===== */
async function loadPosts(){

const { data } = await client
.from("posts")
.select("*")
.eq("user_id",uid)
.order("created_at",{ascending:false});

const box=document.getElementById("posts");
box.innerHTML="";

data.forEach(p=>{
box.innerHTML+=`
<div class="postCard">

<img class="postImg" src="${p.image_url}">

<div class="postBody">
<div class="postUser">${p.user_name}</div>
</div>

</div>
`;
});
}

</script>

</body>
</html>
